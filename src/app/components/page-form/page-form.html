<!-- Coluna 1: Formulário -->
<section class="bg-[#0d1713] rounded-2xl border border-[#1a2f26] p-6 flex flex-col h-fit">
  <div class="flex items-center gap-3 mb-6">
    <div class="w-8 h-8 rounded-full bg-[#132b21] flex items-center justify-center text-[#1fd68b]">
      <mat-icon class="text-[20px] w-[20px] h-[20px]">add</mat-icon>
    </div>
    <h2 class="text-lg font-bold text-white">Nova Ordem</h2>
  </div>

  <form [formGroup]="formulario" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
    
    <!-- NOME -->
    <div class="flex flex-col gap-1.5">
      <label for="nome" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
        <mat-icon class="text-[16px] w-[16px] h-[16px]">person_outline</mat-icon> NOME
      </label>
      <input type="text" id="nome" formControlName="nome" 
             class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
             placeholder="Digite seu nome">
    </div>

    <!-- CPF -->
    <div class="flex flex-col gap-1.5">
      <label for="cpf" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
        <mat-icon class="text-[16px] w-[16px] h-[16px]">badge</mat-icon> CPF
      </label>
      <input type="text" id="cpf" formControlName="cpf" 
             class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
             placeholder="Digite o CPF">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <!-- MARCA -->
      <div class="flex flex-col gap-1.5">
        <label for="marca" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
          <mat-icon class="text-[16px] w-[16px] h-[16px]">smartphone</mat-icon> MARCA
        </label>
            
        <select 
          type="text"
          name="marca" 
          id="marca"
          class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] 
                focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all
                invalid:text-[#3f5c51] text-white" 
          formControlName="marca" 
          required>
            <option type="text" value="" disabled selected hidden>Marca:</option>
            <option type="text" value="Motorola" class="text-white">Motorola</option>
            <option type="text" value="Apple" class="text-white">Apple</option>
            <option type="text" value="Samsung" class="text-white">Samsung</option>
            <option type="text" value="Xiaomi" class="text-white">Xiaomi</option>
        </select>
      </div>

      <!-- MODELO -->
      <div class="flex flex-col gap-1.5">
        <label for="dispositivo" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
          <mat-icon class="text-[16px] w-[16px] h-[16px]">smartphone</mat-icon> MODELOS
        </label>
        <input type="text" id="modelo" formControlName="modelo" 
               class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
               placeholder="Modelo:">
      </div>

      <!-- DEFEITO -->
      <div class="flex flex-col gap-1.5 col-span-2">
        <label for="defeito" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
          <mat-icon class="text-[16px] w-[16px] h-[16px]">build</mat-icon> DEFEITO
        </label>
        <input type="text" id="defeito" formControlName="defeito" 
               class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
               placeholder="Defeito:">
      </div>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <!-- VALOR -->
      <div class="flex flex-col gap-1.5">
        <label for="valor" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
          <mat-icon class="text-[16px] w-[16px] h-[16px]">attach_money</mat-icon> VALOR
        </label>
        <input type="number" id="valor" formControlName="valor" min="1" step="0.01"
               class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
               placeholder="Valor:">
      </div>

      <!-- TELEFONE -->
      <div class="flex flex-col gap-1.5">
        <label for="telefone" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
          <mat-icon class="text-[16px] w-[16px] h-[16px]">call</mat-icon> Nº DE TELEFONE
        </label>
        <input type="tel" id="contato" formControlName="contato" 
               class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all"
               placeholder="Nº de telefone:">
      </div>
    </div>

    <!-- OBSERVAÇÃO -->
    <div class="flex flex-col gap-1.5">
      <label for="observacao" class="text-xs font-bold text-[#7aa899] uppercase tracking-wider flex items-center gap-1">
        <mat-icon class="text-[16px] w-[16px] h-[16px]">description</mat-icon> OBSERVAÇÃO (OPCIONAL)
      </label>
      <textarea id="observacao" formControlName="observacao" rows="3"
                class="w-full px-4 py-3 rounded-xl bg-[#08100d] border border-[#1a2f26] text-white placeholder-[#3f5c51] focus:ring-1 focus:ring-[#1fd68b] focus:border-[#1fd68b] outline-none transition-all resize-none"
                placeholder="Detalhes adicionais..."></textarea>
    </div>

    <button type="submit" [disabled]="formulario.invalid"
            class="mt-4 w-full bg-[#1fd68b] hover:bg-[#1ab877] disabled:opacity-50 disabled:cursor-not-allowed text-[#08100d] font-bold py-3.5 px-4 rounded-xl transition-colors flex items-center justify-center gap-2">
      <mat-icon>add</mat-icon>
      Adicionar Ordem de Serviço
    </button>
  </form>
</section>
